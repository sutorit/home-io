; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM6

monitor_port = COM6
lib_deps = 
    PaulStoffregen/Time
	bblanchon/ArduinoJson@^6.21.2
    ottowinter/ESPAsyncWebServer-esphome@^3.4.0
    knolleary/PubSubClient@^2.8
    https://github.com/mobizt/Firebase-ESP-Client.git
    ; https://github.com/martin-ger/esp32_nat_router.git


platform_packages = platformio/tool-esptoolpy@^2.40900.250804
; board_build.partitions = huge_app.csv
; board_build.partitions = default.csv
board_build.partitions = partitions_ota_4MB.csv
board_build.filesystem = spiffs
; extra_scripts = post:upload_firmware.py

