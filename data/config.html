<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUTORIT Configure</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <button class="settings-btn" onclick="window.location.href='/settings.html'">
      <svg viewBox="0 0 24 24">
        <path
          d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7zm8.94-2.06l1.43 1.43a1 1 0 0 1 0 1.41l-1.52 1.52a1 1 0 0 1-1.41 0l-1.43-1.43a7.04 7.04 0 0 1-1.63.95l-.25 2.04a1 1 0 0 1-1 .87h-2.15a1 1 0 0 1-1-.87l-.25-2.04a7.04 7.04 0 0 1-1.63-.95l-1.43 1.43a1 1 0 0 1-1.41 0l-1.52-1.52a1 1 0 0 1 0-1.41l1.43-1.43a7.04 7.04 0 0 1-.95-1.63l-2.04-.25a1 1 0 0 1-.87-1V9.06a1 1 0 0 1 .87-1l2.04-.25a7.04 7.04 0 0 1 .95-1.63L4.1 4.75a1 1 0 0 1 0-1.41L5.62 1.82a1 1 0 0 1 1.41 0l1.43 1.43c.51-.34 1.05-.64 1.63-.95l.25-2.04a1 1 0 0 1 1-.87h2.15a1 1 0 0 1 1 .87l.25 2.04c.58.31 1.12.61 1.63.95l1.43-1.43a1 1 0 0 1 1.41 0l1.52 1.52a1 1 0 0 1 0 1.41l-1.43 1.43c.34.51.64 1.05.95 1.63l2.04.25a1 1 0 0 1 .87 1v2.15a1 1 0 0 1-.87 1l-2.04.25c-.31.58-.61 1.12-.95 1.63z" />
      </svg>
    </button>

    <div class="title">CONFIGURATION</div>

    <div class="logo-container">
      <img src="sutorit.png" alt="Logo">
    </div>
  </header>

  <div id="status-wrapper">
    <div id="status-indicator" class="status offline"></div>
    <span id="status-text">Checking...</span>
  </div>


  <div id="loader-overlay">
    <div class="loader-content">
      <h2 id="status-text-conf">Saving Configuration...</h2>
      <p id="sec_txt">Please wait <span id="timer">..</span> seconds</p>
    </div>
  </div>

  <main class="content">
    <div class="config_container">
      <form action="/saveConfig" method="POST">

        <div class="config-section">
          <h2>Device Settings</h2>
          <label>Device Name</label>
          <input type="text" id="device_name" name="device_name" value="SUTORIT" placeholder="SUTORIT">

          <label>Device Password</label>
          <div class="password-wrapper">
            <input type="password" id="device_password" name="device_password" value="password" placeholder="password">
            <span class="eye-pass" data-target="device_password" aria-label="Show password" role="button">👁️</span>
          </div>
          <label>Mode</label>
          <select name="mode" id="mode">
            <option value="master">Master</option>
            <option value="slave">Slave</option>
          </select>

          <label>Master IP (Slave mode)</label>
          <input type="text" id="master_ip" name="master_ip" placeholder="192.167.25.1">
        </div>

        <div class="config-section">
          <h2>Wi-Fi Settings</h2>
          <label>Wi-Fi SSID</label>
          <input type="text" id="wifi_ssid" name="wifi_ssid" placeholder="WiFi Name">

          <label>Wi-Fi Password</label>
          <div class="password-wrapper">
            <input type="password" id="wifi_password" name="wifi_password" placeholder="WiFi Password">
            <span class="eye-pass" data-target="wifi_password" aria-label="Show Wi-Fi password" role="button">👁️</span>
          </div>
          <label>Set Wi-Fi IP</label>
          <input type="text" id="wifi_ip" name="wifi_ip" placeholder="192._._._">

          <label>Wi-Fi Gateway IP</label>
          <input type="text" id="wifi_ipgetway" name="wifi_ipgetway" placeholder="192.168.10.01">

          <label>Wi-Fi SubnetMask</label>
          <input type="text" id="wifi_subnetmask" name="wifi_subnetmask" placeholder="255.255.255.0">

          <label>Wi-Fi DNS</label>
          <input type="text" id="wifi_dns" name="wifi_dns" placeholder="8.8.8.8">
        </div>

        <div class="config-section">
          <h2>Firebase Settings</h2>
          <label>Firebase URL</label>
          <input type="text" id="firebase_url" name="firebase_url" placeholder="https://your-project.firebaseio.com/">

          <label>Firebase Key</label>
          <input type="text" id="firebase_key" name="firebase_key" placeholder="your-firebase-database-key">
        </div>

        <div class="config-section">
          <h2>MQTT Settings</h2>
          <label>MQTT Broker</label>
          <input type="text" id="mqtt_broker" name="mqtt_broker" placeholder="mqtt.example.com">

          <label>MQTT Port</label>
          <input type="number" id="mqtt_port" name="mqtt_port" value="1883">

          <label>MQTT Username</label>
          <input type="text" id="mqtt_user" name="mqtt_user" placeholder="username">

          <label>MQTT Password</label>
          <div class="password-wrapper">
            <input type="password" id="mqtt_pass" name="mqtt_pass" placeholder="password">
            <span class="eye-pass" data-target="mqtt_pass" aria-label="Show MQTT password" role="button">👁️</span>
          </div>
        </div>

        <!-- <div class="config-section">
          <h2>Relay Configuration</h2>
          <label>Relay Pins (comma separated)</label>
          <input type="text" name="relay_pins" placeholder="2,4,5,12,13,14,15,16">
        </div> -->

        <div class="config-section">
          <h2>CUSTOMISED SWITCHES</h2>
          <div id="switch-container"></div>
        </div>

        <div class="form-actions">
          <button type="submit">Save Configuration</button>
        </div>
      </form>
    </div>
  </main>
  <div class="footer">
    © <script>document.write(new Date().getFullYear());</script> sutorit iot • All Rights Reserved
  </div>

  <script src="theme.js"></script>
  <script>
    document.addEventListener('click', function (e) {
      const t = e.target;
      if (t.classList && t.classList.contains('eye-pass')) {
        const targetId = t.getAttribute('data-target');
        if (!targetId) return;
        const inp = document.getElementById(targetId);
        if (!inp) return;
        if (inp.type === 'password') {
          inp.type = 'text';
          t.textContent = '🙈';
          t.setAttribute('aria-pressed', 'true');
        } else {
          inp.type = 'password';
          t.textContent = '👁️';
          t.setAttribute('aria-pressed', 'false');
        }
      }
    });

    async function loadConfig() {
      try {
        const res = await fetch("/getConfig");
        const data = await res.json();

        // Fill device settings
        document.getElementById("device_name").value = data.deviceName || "";
        document.getElementById("device_password").value = data.devicePassword || "";
        document.getElementById("mode").value = data.mode || "master";
        document.getElementById("master_ip").value = data.masterIP || "";

        // Fill Wi-Fi settings
        document.getElementById("wifi_ssid").value = data.ssid || "";
        document.getElementById("wifi_password").value = data.password || "";
        document.getElementById("wifi_ip").value = data.ip || "";
        document.getElementById("wifi_ipgetway").value = data.gatewayIP || "";
        document.getElementById("wifi_subnetmask").value = data.subnetMask || "";
        document.getElementById("wifi_dns").value = data.dns || "";

        // Fill MQTT settings
        document.getElementById("mqtt_broker").value = data.mqttBroker || "";
        document.getElementById("mqtt_port").value = data.mqttPort || 1883;
        document.getElementById("mqtt_user").value = data.mqttUser || "";
        document.getElementById("mqtt_pass").value = data.mqttPass || "";

        // Fill Firebase settings
        document.getElementById("firebase_url").value = data.firebaseURL || "";
        document.getElementById("firebase_key").value = data.firebaseKey || "";

        // Update online status
        const statusIndicator = document.getElementById("status-indicator");
        const statusText = document.getElementById("status-text");
        const onlineStatus = data.onlineStatus || "Offline";

        if (onlineStatus.toLowerCase() === "online") {
          statusIndicator.classList.remove("offline");
          statusIndicator.classList.add("online");
          statusText.textContent = "Online";
        } else {
          statusIndicator.classList.remove("online");
          statusIndicator.classList.add("offline");
          statusText.textContent = "Offline";
        }
        // Render switch mapping dropdowns dynamically
        const totalOutput = data.relayCount || 0;    // from backend
        const switchMap = data.switchMap || [];      // array from backend
        renderSwitchDropdowns(totalOutput, switchMap);

      } catch (err) {
        console.error("Failed to load config", err);
      }
    }

    function renderSwitchDropdowns(totalOutput, switchMap) {
      const container = document.getElementById("switch-container");
      container.innerHTML = "";

      const currentAssignments = {};
      for (let i = 0; i < totalOutput; i++) {
        currentAssignments[i + 1] = switchMap && switchMap[i] ? switchMap[i].output || i + 1 : i + 1;
      }

      for (let i = 0; i < totalOutput; i++) {
        const block = document.createElement("div");

        const label = document.createElement("h3");
        label.textContent = "SWITCH " + (i + 1);
        block.appendChild(label);

        // OUTPUT MAP
        const outLabel = document.createElement("label");
        outLabel.textContent = "Output Mapping:";
        block.appendChild(outLabel);

        const select = document.createElement("select");
        select.name = "switch_output_" + (i + 1);
        for (let s = 1; s <= totalOutput; s++) {
          const option = document.createElement("option");
          option.value = s;
          option.textContent = "OUTPUT " + s;
          if (currentAssignments[i + 1] === s) option.selected = true;
          select.appendChild(option);
        }

        select.addEventListener("change", function () {
          const newVal = parseInt(this.value);
          const oldVal = currentAssignments[i + 1];
          if (newVal === oldVal) return;
          for (let j = 1; j <= totalOutput; j++) {
            if (j !== i + 1 && currentAssignments[j] === newVal) {
              currentAssignments[j] = oldVal;
              const otherSelect = document.querySelector(`select[name="switch_output_${j}"]`);
              if (otherSelect) otherSelect.value = oldVal;
              break;
            }
          }
          currentAssignments[i + 1] = newVal;
        });
        block.appendChild(select);

        // AC/DC TYPE
        const typeLabel = document.createElement("label");
        typeLabel.textContent = "AC/DC Type:";
        block.appendChild(typeLabel);

        const typeSelect = document.createElement("select");
        typeSelect.name = "switch_type_" + (i + 1);
        ["ac", "dc"].forEach((t) => {
          const opt = document.createElement("option");
          opt.value = t;
          opt.textContent = t.toUpperCase();
          typeSelect.appendChild(opt);
        });

        // ✅ Properly read from backend without fallback or defaults
        if (switchMap && switchMap[i] && switchMap[i].type) {
          typeSelect.value = switchMap[i].type.toLowerCase();
        }

        block.appendChild(typeSelect);

        // SWITCH LOGIC TYPE
        const logicLabel = document.createElement("label");
        logicLabel.textContent = "Switch Type:";
        block.appendChild(logicLabel);

        const logicSelect = document.createElement("select");
        logicSelect.name = "switch_logic_" + (i + 1);
        ["toggle", "bell", "2way", "push"].forEach((t) => {
          const opt = document.createElement("option");
          opt.value = t;
          opt.textContent = t.charAt(0).toUpperCase() + t.slice(1);
          logicSelect.appendChild(opt);
        });

        if (switchMap && switchMap[i] && switchMap[i].logic) {
          logicSelect.value = switchMap[i].logic.toLowerCase();
        }

        block.appendChild(logicSelect);
        container.appendChild(block);
      }
    }



    // Load when page opens
    window.addEventListener("load", loadConfig);

    // Switch mapping logic
    const form = document.querySelector('form');
    const loader = document.getElementById('loader-overlay');
    const timerEl = document.getElementById('timer');
    const sec_txt = document.getElementById('sec_txt');

    form.addEventListener('submit', function (e) {
      e.preventDefault(); // prevent default submit to show loader

      // Hide the form
      document.querySelector('.config_container').style.display = 'none';
      // Show loader
      loader.style.display = 'block';

      let timeLeft = 10; // 10 seconds timer
      timerEl.textContent = timeLeft;

      const countdown = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;

        // At half-time, change text
        if (timeLeft === Math.floor(10 / 2)) {
          document.getElementById("status-text-conf").textContent = "Restarting board...";
        }

        // When timer ends, redirect
        if (timeLeft <= 0) {
          document.getElementById("status-text-conf").textContent = "Wait, dashboard preparing...";
          sec_txt.style.position = "absolute";
          sec_txt.style.left = "50%";
          sec_txt.style.top = "35%";
          sec_txt.style.transform = "translate(-50%, -50%)";

          sec_txt.style.color = "red";
          sec_txt.style.fontWeight = "bold";
          sec_txt.style.backgroundColor = "white";
          sec_txt.style.padding = "5px";
          sec_txt.style.borderRadius = "5px";
          sec_txt.style.width = "fit-content";
          sec_txt.style.textAlign = "center";

          sec_txt.textContent = "*if you in configuration mode, please leave this page open";
          clearInterval(countdown);
          window.location.href = '/';
        }
      }, 1000);

      // Send the form data via fetch
      const formData = new FormData(form);
      fetch(form.action, {
        method: form.method,
        body: formData
      })
        .then(res => res.json())
        .then(data => {
          console.log('Config saved', data);
          // If success, still let timer run (so user sees restart msg)
          // If you want instant redirect instead, uncomment:
          // window.location.href = '/';
        })
        .catch(err => {
          console.error('Error saving config', err);
        });
    });


  </script>

</body>

</html>
