<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUTORIT SETTINGS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <button class="settings-btn" onclick="window.location.href='/settings.html'">
            <svg viewBox="0 0 24 24">
                <path
                    d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7zm8.94-2.06l1.43 1.43a1 1 0 0 1 0 1.41l-1.52 1.52a1 1 0 0 1-1.41 0l-1.43-1.43a7.04 7.04 0 0 1-1.63.95l-.25 2.04a1 1 0 0 1-1 .87h-2.15a1 1 0 0 1-1-.87l-.25-2.04a7.04 7.04 0 0 1-1.63-.95l-1.43 1.43a1 1 0 0 1-1.41 0l-1.52-1.52a1 1 0 0 1 0-1.41l1.43-1.43a7.04 7.04 0 0 1-.95-1.63l-2.04-.25a1 1 0 0 1-.87-1V9.06a1 1 0 0 1 .87-1l2.04-.25a7.04 7.04 0 0 1 .95-1.63L4.1 4.75a1 1 0 0 1 0-1.41L5.62 1.82a1 1 0 0 1 1.41 0l1.43 1.43c.51-.34 1.05-.64 1.63-.95l.25-2.04a1 1 0 0 1 1-.87h2.15a1 1 0 0 1 1 .87l.25 2.04c.58.31 1.12.61 1.63.95l1.43-1.43a1 1 0 0 1 1.41 0l1.52 1.52a1 1 0 0 1 0 1.41l-1.43 1.43c.34.51.64 1.05.95 1.63l2.04.25a1 1 0 0 1 .87 1v2.15a1 1 0 0 1-.87 1l-2.04.25c-.31.58-.61 1.12-.95 1.63z" />
            </svg>
        </button>

        <div class="title">MORE SETTINGS</div>

        <div class="logo-container">
            <img src="sutorit.png" alt="Logo">
        </div>
    </header>
    <!-- UPDATE POPUP -->
    <div id="updatePopup" class="update-overlay">
        <div class="update-card">

            <div class="circle-wrap">
                <svg class="progress-ring" width="120" height="120">
                    <circle class="bg" cx="60" cy="60" r="52" />
                    <circle class="progress" cx="60" cy="60" r="52" />
                </svg>

                <div class="percent-text" id="percentText">0%</div>

                <!-- SUCCESS -->
                <div class="done-check" id="doneCheck">✓</div>

                <!-- FAILURE -->
                <div class="fail-cross" id="failCross">✕</div>
            </div>


            <h3 id="updateTitle">Checking for updates…</h3>
            <p id="updateDesc">Please wait</p>

            <div id="updateInfo" style="display:none;">
                <p>Current: <b id="currentVer"></b></p>
                <p>Latest: <b id="latestVer"></b></p>
                <ul id="updateNotes"></ul>
            </div>

            <div class="update-actions" id="updateActions" style="display:none;">
                <button class="btn-primary" onclick="startUpdate()">Update Now</button>
                <button class="btn-secondary" onclick="closeUpdatePopup()">Later</button>
            </div>

        </div>
    </div>

    <main class="content">
        <div class="config_container">
            <div class="config-section">
                <!-- Theme Section -->
                <h2>Theme</h2>
                <label class="theme-switch" for="theme-toggle-checkbox">
                    <input type="checkbox" id="theme-toggle-checkbox">
                    <span class="slider">
                        <span class="icon sun"></span>
                        <span class="icon moon"></span>
                    </span>
                </label>
                <p>Toggle between Light and Dark modes.</p>
            </div>
            <!-- Update Section -->
            <div class="config-section">
                <h2>UPDATE</h2>
                <button class="update-btn" onclick="checkUpdate()">
                    Check for Updates
                </button>
            </div>
            <!-- Logout Section -->
            <div class="config-section">
                <h2>LOGOUT</h2>
                <button class="logout-btn" onclick="logout()">Logout</button>
                <p>Click to logout from the current session.</p>
            </div>


        </div>
        <div id="popup" class="popup-overlay">

            <!-- Confirmation box -->
            <div class="popup-box" id="confirmBox">
                <h3 id="popup-message">Are you sure?</h3>
                <div class="popup-actions">
                    <button class="popup-btn yes-btn" onclick="confirmAction()">Yes</button>
                    <button class="popup-btn no-btn" onclick="closePopup()">No</button>
                </div>
            </div>
    </main>
    <script>
        const checkbox = document.getElementById('theme-toggle-checkbox');
        const body = document.body;

        // Apply saved theme on load
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';

            if (savedTheme === 'dark') {
                body.classList.remove('light-mode'); // ensure dark
                checkbox.checked = true;             // checked means dark
            } else {
                body.classList.add('light-mode');    // enable light
                checkbox.checked = false;
            }
        });

        // Toggle theme
        checkbox.addEventListener('change', () => {
            if (checkbox.checked) {
                // Dark mode
                body.classList.remove('light-mode');
                localStorage.setItem('theme', 'dark');
            } else {
                // Light mode
                body.classList.add('light-mode');
                localStorage.setItem('theme', 'light');
            }
        });

    </script>
    <script>
        let pendingAction = null;

        function logout() {
            pendingAction = 'logout';
            showPopup('Are you sure you want to logout?');
        }

        function showPopup(message) {
            document.getElementById('popup-message').innerText = message;
            document.getElementById('popup').style.display = 'flex';
        }

        function closePopup() {
            document.getElementById('popup').style.display = 'none';
            pendingAction = null;
        }

        function confirmAction() {
            if (pendingAction === 'logout') {
                window.location.href = '/logout'; // Redirect to logout endpoint
            }
            closePopup();
        }


    </script>
    <script>
        const circle = document.querySelector('.progress');
        const radius = 52;
        const circumference = 2 * Math.PI * radius;

        circle.style.strokeDasharray = circumference;
        circle.style.strokeDashoffset = circumference;

        function setProgress(p) {
            circle.style.strokeDashoffset =
                circumference - (p / 100) * circumference;
            document.getElementById('percentText').innerText = p + "%";
        }

        // document.addEventListener('DOMContentLoaded', () => {
        //     document.getElementById('updatePopup').style.display = 'flex';
        //     setTimeout(checkUpdate, 800);
        // });

        function checkUpdate() {
            document.getElementById('updatePopup').style.display = 'flex';

            // Reset UI state
            document.querySelector('.circle-wrap').classList.remove('failed');
            document.getElementById('doneCheck').style.display = 'none';
            // document.getElementById('percentText').style.display = 'block';
            setProgress(0);

            fetch('/checkUpdate')
                .then(r => {
                    if (!r.ok) throw new Error("HTTP error");
                    return r.json();
                })
                .then(d => {
                    if (!d.update) {
                        failUpdate("No Update Available");
                        return;
                    }

                    document.getElementById('updateTitle').innerText = "Update Available";
                    document.getElementById('updateDesc').innerText = "Ready to install";

                    document.getElementById('currentVer').innerText = d.current;
                    document.getElementById('latestVer').innerText = d.latest;

                    const ul = document.getElementById('updateNotes');
                    ul.innerHTML = "";
                    d.notes.forEach(n => {
                        const li = document.createElement('li');
                        li.textContent = n;
                        ul.appendChild(li);
                    });

                    document.getElementById('updateInfo').style.display = 'block';
                    document.getElementById('updateActions').style.display = 'flex';
                })
                .catch(() => {
                    failUpdate("Update Check Failed");
                });
        }


        let timer = null;

        function startUpdate() {
            document.getElementById('updateInfo').style.display = 'none';
            document.getElementById('updateActions').style.display = 'none';

            document.getElementById('updateTitle').innerText = "Updating…";
            document.getElementById('updateDesc').innerText = "Do not power off";

            fetch('/startUpdate');
            timer = setInterval(getProgress, 500);
        }

        function getProgress() {
            fetch('/otaProgress')
                .then(r => r.json())
                .then(d => {
                    setProgress(d.progress);

                    if (!d.running && d.progress >= 99) {
                        clearInterval(timer);
                        finish();
                    }
                });
        }

        function finish() {
            clearInterval(timer);

            const wrap = document.querySelector('.circle-wrap');

            // REMOVE other states
            wrap.classList.remove('failed');

            // ADD SUCCESS STATE
            wrap.classList.add('success');

            // Safety hide %
            const percent = document.getElementById('percentText');
            percent.style.display = 'none';

            document.getElementById('updateTitle').innerText = "Update Complete";
            document.getElementById('updateTitle').classList.remove('update-failed');
            document.getElementById('updateTitle').classList.add('update-success');

            document.getElementById('updateDesc').innerText = "Restarting…";

            // Redirect after reboot
            setTimeout(() => {
                window.location.replace("/");
            }, 2500);
        }


        function closeUpdatePopup() {
            document.getElementById('updatePopup').style.display = 'none';
        }

        function failUpdate(reason = "Update Check Failed") {
            clearInterval(timer);

            const wrap = document.querySelector('.circle-wrap');
            wrap.classList.add('failed');

            // HIDE % TEXT (INLINE STYLE FIX)
            document.getElementById('percentText').style.display = 'none';

            // SHOW FAIL ICON (CORRECT ELEMENT)
            document.getElementById('failCross').style.display = 'flex';
            document.getElementById('doneCheck').style.display = 'none';

            document.getElementById('updateTitle').innerText = reason;
            document.getElementById('updateTitle').classList.add('update-failed');

            document.getElementById('updateDesc').innerText = "Please try again";
        }

        // Close popup when clicking outside the card
        document.getElementById('updatePopup').addEventListener('click', function (e) {
            if (e.target === this) {
                closeUpdatePopup();
            }
        });

    </script>
</body>

</html>
