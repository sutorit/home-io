<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUTORIT DASH</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Splash Screen Overlay -->
  <div id="splash">
    <img src="sutorit.png" alt="Logo" class="splash-logo">
  </div>

  <header>
    <button class="settings-btn" onclick="openSettings()">
      <svg viewBox="0 0 24 24">
        <path
          d="M12 15.5A3.5 3.5 0 1 0 12 8.5a3.5 3.5 0 0 0 0 7zm8.94-2.06l1.43 1.43a1 1 0 0 1 0 1.41l-1.52 1.52a1 1 0 0 1-1.41 0l-1.43-1.43a7.04 7.04 0 0 1-1.63.95l-.25 2.04a1 1 0 0 1-1 .87h-2.15a1 1 0 0 1-1-.87l-.25-2.04a7.04 7.04 0 0 1-1.63-.95l-1.43 1.43a1 1 0 0 1-1.41 0l-1.52-1.52a1 1 0 0 1 0-1.41l1.43-1.43a7.04 7.04 0 0 1-.95-1.63l-2.04-.25a1 1 0 0 1-.87-1V9.06a1 1 0 0 1 .87-1l2.04-.25a7.04 7.04 0 0 1 .95-1.63L4.1 4.75a1 1 0 0 1 0-1.41L5.62 1.82a1 1 0 0 1 1.41 0l1.43 1.43c.51-.34 1.05-.64 1.63-.95l.25-2.04a1 1 0 0 1 1-.87h2.15a1 1 0 0 1 1 .87l.25 2.04c.58.31 1.12.61 1.63.95l1.43-1.43a1 1 0 0 1 1.41 0l1.52 1.52a1 1 0 0 1 0 1.41l-1.43 1.43c.34.51.64 1.05.95 1.63l2.04.25a1 1 0 0 1 .87 1v2.15a1 1 0 0 1-.87 1l-2.04.25c-.31.58-.61 1.12-.95 1.63z" />
      </svg>
    </button>

    <div class="title" id="room-name"></div>


    <div class="logo-container">
      <img src="sutorit.png" alt="Logo">
    </div>
  </header>

  <div id="status-wrapper">
    <div id="status-indicator" class="status offline"></div>
    <span id="status-text">Checking...</span>
  </div>



  <main class="content">
    <div id="brightness-modal" class="slider-modal">
      <div class="slider-content">
        <button class="close-btn" onclick="closeModal()">✖</button>
        <h3 id="modal-title"></h3>

        <!-- Thin modern slider with icons -->
        <div class="slider-wrapper">
          <span class="icon">🔅</span>
          <input type="range" id="slider" min="0" max="100" />
          <span class="icon">🔆</span>
        </div>

        <div id="brightness-value">%</div>
      </div>
    </div>

    <div class="container" id="relays"></div>
  </main>

  <div class="footer">
    © <script>document.write(new Date().getFullYear());</script> sutorit iot • All Rights Reserved
  </div>


  <script src="theme.js"></script>

  <script>
    const container = document.getElementById('relays');
    let relayCount = 0; // Will be set after fetching status
    let isBusy = false; // Prevent multiple rapid actions
    let sliderActive = false; // Track if user is dragging the slider
    let simulation = false; // Set to false to connect to real backend

    async function initRelays() {
      if (!simulation) {
        // container.innerHTML = `<p class="loading-message">⏳ Loading...</p>`;
        try {
          const res = await fetch("/status");
          const data = await res.json();
          relayCount = data.relayCount || 0;
          document.getElementById("room-name").innerText = data.deviceName || "SUTORIT Device";

          const statusIndicator = document.getElementById("status-indicator");
          const statusText = document.getElementById("status-text");
          const onlineStatus = data.onlineStatus || "Offline";

          if (onlineStatus.toLowerCase() === "online") {
            statusIndicator.classList.remove("offline");
            statusIndicator.classList.add("online");
            statusText.textContent = "Online";
          } else {
            statusIndicator.classList.remove("online");
            statusIndicator.classList.add("offline");
            statusText.textContent = "Offline";
          }

          for (let i = 1; i <= relayCount; i++) {
            const wrap = document.createElement('div');
            wrap.classList.add('switch-wrapper');

            const sw = document.createElement('div');
            sw.classList.add('switch');

            // get relay data
            const relay = data.relays[i - 1];
            const brightness = relay.brightness ?? 100;
            sw.dataset.state = relay.state ? 'on' : 'off';
            sw.dataset.brightness = brightness;

            const toggle = document.createElement('div');
            toggle.classList.add('toggle');
            sw.appendChild(toggle);

            // Set initial background based on brightness
            sw.style.background = `rgba(255, 215, 0, ${brightness / 100})`;

            // Click to toggle relay
            sw.onclick = async () => {
              if (isBusy) return;
              disableAllSwitches();

              const newState = sw.dataset.state === 'off' ? 'on' : 'off';
              await fetch(`/relay/${newState}?ch=${i}`);

              await pollRelayStates();
              enableAllSwitches();
            };

            attachLongPress(sw, i);

            const label = document.createElement('div');
            label.classList.add('label');
            label.innerText = `Switch ${i}`;

            wrap.appendChild(sw);
            wrap.appendChild(label);
            container.appendChild(wrap);
          }

          // Apply current states & brightness from server
          data.relays.forEach((relay, i) => {
            const sw = container.children[i].querySelector(".switch");
            sw.dataset.state = relay.state ? "on" : "off";
            sw.dataset.brightness = relay.brightness ?? 100;
            sw.style.background = `rgba(255, 215, 0, ${(relay.brightness ?? 0) / 100})`;
            updateSwitch(sw);
          });

        } catch (err) {
          // console.error("Init failed", err);
          container.innerHTML = `<p class="error-message">⚠️ Error loading data. Please check your connection.</p>`;
        }
      } else {
        // Simulation mode for testing without backend
        relayCount = 4;
        document.getElementById("room-name").innerText = "Simulation Mode";

        for (let i = 1; i <= 8; i++) {
          const wrap = document.createElement('div');
          wrap.classList.add('switch-wrapper');

          const sw = document.createElement('div');
          sw.classList.add('switch');
          sw.dataset.state = 'off';
          sw.dataset.brightness = 100;

          const toggle = document.createElement('div');
          toggle.classList.add('toggle');
          sw.appendChild(toggle);

          sw.style.background = `rgba(255, 215, 0, 1)`;

          sw.onclick = () => {
            if (isBusy) return;
            disableAllSwitches();

            const newState = sw.dataset.state === 'off' ? 'on' : 'off';
            sw.dataset.state = newState;
            updateSwitch(sw);

            setTimeout(() => {
              enableAllSwitches();
            }, 500);
          };

          attachLongPress(sw, i);

          const label = document.createElement('div');
          label.classList.add('label');
          label.innerText = `Switch ${i}`;

          wrap.appendChild(sw);
          wrap.appendChild(label);
          container.appendChild(wrap);
        }
      }

    }

    async function updateStatus() {
      try {
        const res = await fetch("/status");
        const data = await res.json();

        const statusIndicator = document.getElementById("status-indicator");
        const statusText = document.getElementById("status-text");
        const onlineStatus = data.onlineStatus || "Offline";

        if (onlineStatus.toLowerCase() === "online") {
          statusIndicator.classList.remove("offline");
          statusIndicator.classList.add("online");
          statusText.textContent = "Online";
          pollRelayStates(); // Refresh relay states when online
        } else {
          statusIndicator.classList.remove("online");
          statusIndicator.classList.add("offline");
          statusText.textContent = "Offline";
        }
      } catch (err) {
        // container.innerHTML = `<p class="error-message">⚠️ Error loading data. Please check your connection.</p>`;
      }
    }

    // Call every 10 seconds
    setInterval(updateStatus, 10000);


    function updateSwitch(sw) {
      sw.classList.toggle('on', sw.dataset.state === 'on');
    }

    async function pollRelayStates() {
      try {
        const res = await fetch("/status");
        const data = await res.json();

        data.relays.forEach((relay, i) => {
          const sw = container.children[i].querySelector(".switch");

          // ----- Update switch state -----
          sw.dataset.state = relay.state ? "on" : "off";
          updateSwitch(sw);

          // ----- Update switch brightness -----
          const brightness = relay.brightness ?? 100;
          sw.dataset.brightness = brightness;
          sw.style.background = `rgba(255, 215, 0, ${brightness / 100})`;

          // ----- Update modal slider if this switch is open -----
          if (currentChannel === i + 1 && currentSwitch === sw && !sliderActive) {
            const slider = document.getElementById("slider");
            const valueText = document.getElementById("brightness-value");

            // Only update slider if user is not actively dragging
            // if (!slider.matches(':active')) {
            slider.value = brightness;
            valueText.innerText = brightness + "%";
            updateSliderTrack(slider);
            // }
          }
        });
      } catch (err) {
        // container.innerHTML = `<p class="error-message">⚠️ Error loading data. Please check your connection.</p>`;
        console.error("Polling failed", err);
      }
    }



    function disableAllSwitches() {
      isBusy = true;
      document.querySelectorAll('.switch').forEach(sw => {
        sw.classList.add('disabled');
        sw.style.pointerEvents = "none";
        sw.style.opacity = "0.5";
      });
    }

    function enableAllSwitches() {
      isBusy = false;
      document.querySelectorAll('.switch').forEach(sw => {
        sw.classList.remove('disabled');
        sw.style.pointerEvents = "auto";
        sw.style.opacity = "1";
      });
    }

    window.addEventListener("load", () => {
      setTimeout(() => {
        document.getElementById("splash").classList.add("fade-out");
        setTimeout(() => {
          document.getElementById("splash").remove();
          initRelays();
          setInterval(() => {
            if (!isBusy) pollRelayStates();
          }, 2000);
        }, 1000);
      }, 2000);
    });

    function openSettings() {
      window.location.href = 'settings.html';
    }

    // =============== Slider Modal ===============
    let longPressTimer;
    let currentChannel = null;
    let currentSwitch = null;

    function attachLongPress(sw, ch) {
      const start = () => {
        longPressTimer = setTimeout(() => {
          openModal(ch, sw);
        }, 600);
      };
      const clear = () => clearTimeout(longPressTimer);

      sw.addEventListener("mousedown", start);
      sw.addEventListener("mouseup", clear);
      sw.addEventListener("mouseleave", clear);

      // mobile support
      sw.addEventListener("touchstart", start);
      sw.addEventListener("touchend", clear);
      sw.addEventListener("touchcancel", clear);
    }

    function openModal(ch, sw) {
      currentChannel = ch;
      currentSwitch = sw;

      const modal = document.getElementById("brightness-modal");
      modal.style.display = "flex";

      document.getElementById("modal-title").innerText = `Switch ${ch}`;

      const slider = document.getElementById("slider");
      const value = document.getElementById("brightness-value");

      let currentBrightness = sw.dataset.brightness || 100;
      slider.value = currentBrightness;
      value.innerText = currentBrightness + "%";
      updateSliderTrack(slider);

      // Live preview (UI only)
      slider.oninput = () => {
        sliderActive = true; // user is dragging
        let brightness = slider.value;
        value.innerText = brightness + "%";
        sw.dataset.brightness = brightness;

        sw.style.background = `rgba(255, 215, 0, ${brightness / 100})`;
        sw.dataset.state = brightness > 0 ? "on" : "off";
        updateSwitch(sw);

        updateSliderTrack(slider);
      };

      // When user releases (mouse or touch), unlock
      slider.onchange = async () => {
        sliderActive = false; // finished dragging
        let brightness = slider.value;
        try {
          await fetch(`/relay/brightness?ch=${ch}&val=${brightness}`);
          // console.log(`Brightness sent: Switch ${ch} = ${brightness}%`);
        } catch (err) {
          console.error("Failed to send brightness", err);
        }
      };


    }

    function closeModal() {
      document.getElementById("brightness-modal").style.display = "none";
      currentChannel = null;
      currentSwitch = null;
    }

    function updateSliderTrack(slider) {
      let value = slider.value;

      let isDark = !document.body.classList.contains("light-mode");

      // Compute brightness of yellow
      let lightness = 30 + (value / 100) * 30; // 30% → 60%
      let fillColor = `hsl(50, 100%, ${lightness}%)`;

      let emptyColor = isDark ? "#333" : "#ddd";

      slider.style.background =
        `linear-gradient(
      to right,
      ${fillColor} 0%,
      ${fillColor} ${value}%,
      ${emptyColor} ${value}%,
      ${emptyColor} 100%
    )`;

      const text = document.getElementById("brightness-value");

      // Adjust glow intensity based on slider value
      let glowStrength = value / 100; // 0 → 1
      let glowColor = `rgba(255, 217, 0, ${glowStrength})`; // yellow glow

      // Update text style
      text.style.color = `rgb(${200 + glowStrength * 55}, ${180 + glowStrength * 75}, 0)`; // brighter yellow
      text.style.textShadow = `0 0 ${5 + glowStrength * 20}px ${glowColor}`;
    }
  </script>
</body>

</html>
