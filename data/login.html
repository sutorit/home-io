<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • SUTORIT</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div id="splash">
        <img src="sutorit.png" alt="Logo" class="splash-logo">
    </div>
    <div class="login-container">
        <div class="logo-container">
            <img src="sutorit.png" alt="Logo">
        </div>
        <!-- <img src="sutorit.png" alt="Logo" style="width:80px; margin-bottom:1rem;"> -->
        <div class="login-box">
            <h2>Login</h2>
            <input type="text" id="username" placeholder="Device Name" autocomplete="off">
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Password">
                <span class="toggle-password" onclick="togglePassword()">👁️</span>
            </div>

            <button onclick="login()">Sign In</button>
            <p id="error" class="login-error">Invalid credentials</p>
        </div>
    </div>

    <div class="footer">
        ©
        <script>document.write(new Date().getFullYear());</script> Sutorit iot • All Rights Reserved
    </div>

    <script src="theme.js"></script>

    <script>
        window.addEventListener("load", () => {
            setTimeout(() => {
                document.getElementById("splash").classList.add("fade-out");
                setTimeout(() => {
                    document.getElementById("splash").remove();
                }, 1000);
            }, 2000);
        });

        function login() {
            let username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            // 🔹 REMOVE spaces + convert to UPPERCASE
            username = username.replace(/\s+/g, "").toUpperCase();

            // get ?redirect param if present
            const params = new URLSearchParams(window.location.search);
            const redirect = params.get("redirect") || "/";

            fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&redirect=${encodeURIComponent(redirect)}`
            })
                .then(res => {
                    if (res.status === 302 || res.redirected || res.status === 200) {
                        window.location.href = redirect;
                    } else {
                        document.getElementById("error").style.display = "block";
                    }
                })
                .catch(() => {
                    document.getElementById("error").style.display = "block";
                });
        }

        function togglePassword() {
            const pwd = document.getElementById("password");
            const eye = document.querySelector(".toggle-password");

            if (pwd.type === "password") {
                pwd.type = "text";
                eye.textContent = "🙈";
            } else {
                pwd.type = "password";
                eye.textContent = "👁️";
            }
        }

    </script>

</body>

</html>
